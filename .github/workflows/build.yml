name: Build Desktop Packages

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      upload_release:
        description: Upload macOS and Linux assets to a GitHub Release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag to upload assets to
        required: false
        default: v2.0
        type: string

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate assets
        run: npm run check:assets

      - name: Package portable EXE
        run: npm run package:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 叛逆汉堡大王-桌面宠物-windows-x64
          path: dist/叛逆汉堡大王-桌面宠物.exe

      - name: Upload Windows assets to release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release == true }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $version = node -p "require('./package.json').version"
          $releaseVersion = $version -replace '\.0$',''
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist/叛逆汉堡大王-桌面宠物.exe" "release-assets/RebelliousBurgerKing-DesktopPet.exe"
          Compress-Archive -Path "dist/叛逆汉堡大王-桌面宠物.exe" -DestinationPath "release-assets/RebelliousBurgerKing-DesktopPet-v$releaseVersion-win-x64.zip" -Force
          gh release upload "$env:RELEASE_TAG" release-assets/* --repo "$env:GITHUB_REPOSITORY" --clobber

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate assets
        run: npm run check:assets

      - name: Package macOS DMG and ZIP
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run package:mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 叛逆汉堡大王-桌面宠物-macos-universal
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Upload macOS assets to release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p release-assets
          cp "dist/叛逆汉堡大王-桌面宠物.dmg" "release-assets/RebelliousBurgerKing-DesktopPet-${RELEASE_TAG}-mac-universal.dmg"
          cp "dist/叛逆汉堡大王-桌面宠物.zip" "release-assets/RebelliousBurgerKing-DesktopPet-${RELEASE_TAG}-mac-universal.zip"
          gh release upload "$RELEASE_TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - eb_arch: x64
            deb_arch: amd64
          - eb_arch: arm64
            deb_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate assets
        run: npm run check:assets

      - name: Package Linux DEB
        run: npm run package:linux -- --${{ matrix.eb_arch }}

      - name: Normalize DEB artifact name
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          release_version="${version%\.0}"
          mkdir -p release-assets
          deb_file="$(find dist -maxdepth 1 -name '*.deb' -print -quit)"
          cp "$deb_file" "release-assets/RebelliousBurgerKing-DesktopPet-v${release_version}-linux-${{ matrix.deb_arch }}.deb"

      - name: Inspect DEB package
        shell: bash
        run: |
          deb_file="$(find release-assets -maxdepth 1 -name '*.deb' -print -quit)"
          dpkg-deb --info "$deb_file"
          dpkg-deb --field "$deb_file" Architecture | grep -Fx "${{ matrix.deb_arch }}"
          dpkg-deb --field "$deb_file" Version | grep -Fx "$(node -p "require('./package.json').version")"
          contents_file="$(mktemp)"
          dpkg-deb --contents "$deb_file" > "$contents_file"
          grep -E "/usr/share/applications/.+\\.desktop$" "$contents_file"
          head -n 20 "$contents_file"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 叛逆汉堡大王-桌面宠物-linux-${{ matrix.deb_arch }}
          path: release-assets/*.deb

      - name: Upload Linux assets to release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release-assets/*.deb --repo "$GITHUB_REPOSITORY" --clobber
